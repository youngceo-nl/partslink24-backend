# Single-service compose file for production deploy.
# Usage on a DigitalOcean Droplet (or any Docker host):
#   git clone https://github.com/youngceo-nl/partslink24-backend.git
#   cd partslink24-backend
#   cp .env.example .env && $EDITOR .env    # fill PARTSLINK24_* secrets
#   docker compose up -d --build
#
# The bind-mounts on ./sessions and ./artifacts make the login session +
# failure screenshots survive container restarts. If you destroy the host
# you'll lose them — that's fine, the service just re-logs-in on first call.

services:
  api:
    build: .
    image: partslink24-backend:latest
    container_name: partslink24-backend
    restart: unless-stopped
    env_file: .env
    environment:
      # Override any HEADLESS=false from a dev .env — production is headless.
      HEADLESS: "true"
      NODE_ENV: production
      PORT: "3000"
    ports:
      - "3000:3000"
    volumes:
      - ./sessions:/app/sessions
      - ./artifacts:/app/artifacts
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3
