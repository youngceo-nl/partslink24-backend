# DigitalOcean App Platform spec. Create with:
#   doctl apps create --spec .do/app.yaml
#
# Secrets (PARTSLINK24_*) are NOT in this file — add them as encrypted env
# vars via the console or `doctl apps update` after the first deploy.
#
# Uses the Dockerfile at repo root, which is based on Microsoft's official
# Playwright image and already has chromium + system libs installed.

name: partslink24-backend
region: ams

services:
  - name: api
    github:
      repo: youngceo-nl/partslink24-backend
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 3000
    # Playwright + chromium needs ~1 GB. Don't go smaller.
    instance_size_slug: basic-s
    instance_count: 1
    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 30
    envs:
      - key: NODE_ENV
        value: production
      - key: HEADLESS
        value: "true"
      - key: PORT
        value: "3000"
      - key: PARTSLINK24_BASE_URL
        value: https://www.partslink24.com
      # Set these as SECRET in the App Platform console after first deploy:
      # - PARTSLINK24_COMPANY_ID
      # - PARTSLINK24_USERNAME
      # - PARTSLINK24_ACCESS_CODE
